<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pin-Up Bonus</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .promo {
      position: relative;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .promo img {
      width: 100%;
      height: auto;
      display: block;
    }

    .claim-link {
      position: absolute;
      left: 50%;
      top: 42%;
      transform: translateX(-50%);
      width: 68%;
      height: 4.2%;
      cursor: pointer;
      background: transparent;
      border: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .claim-link:hover,
    .claim-link:focus,
    .claim-link:focus-visible {
      outline: none;
      background: transparent;
    }
  </style>
</head>

<body>
  <div class="promo">
    <img src="/image.png" alt="Casino Bonus 120% + 250 FS" width="480" height="854" />
    <a class="claim-link" href="https://toptdspup.com/XM6e2688/" aria-label="Claim Now"></a>
  </div>
</body>

</html>
